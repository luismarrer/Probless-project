<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Probless Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .sidebar {
            height: 100vh;
            position: sticky;
            top: 0;
            font-size: smaller;
            transition: all 0.3s ease;
        }

        .sidebar-toggle-icon {
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .create-ticket-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background-color: transparent;
            border: none;
            border-bottom: 2px solid rgba(194, 78, 217, 0.7);
            color: rgba(194, 78, 217, 1);
            padding: 5px 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .navbar-brand {
            font-family: 'Tinos', serif;
            font-weight: bold;
            font-size: 2rem;
            background: linear-gradient(rgba(194, 78, 217), rgba(181, 91, 130));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn {
            background-color: transparent;
            border: none;
            border-bottom: 2px solid rgba(194, 78, 217, 0.7);
            color: rgba(194, 78, 217, 1);
            padding: 5px 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Flex container for two rows on the left and ticket rows on the right */
        .dashboard-container {
            display: flex;
            height: 100vh;
        }

        /* Left column containing two rows */
        .left-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
        }

        /* Each section in the left column */
        .left-row {
            background-color: #f2f0f0;
            text-align: center;
            padding: 20px;
            border-radius: 8px;

        }

        /* Right column containing three rows for tickets */
        .right-column {
            background-color: #f2f0f0;
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 10px;
        }

        /* Ticket sections in the right column */
        .ticket-row {
            flex: 1;
            background-color: #f2f0f0;
            text-align: center;
            margin-bottom: 10px;
            padding: 20px;
            border-radius: 8px;
        }

        h2 {
            margin: 0;
        }
    </style>
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3 navbar-shrink" id="mainNav">
        <div class="container-fluid">
            <a class="navbar-brand" href="#page-top">Probless</a>
            <button class="navbar-toggler navbar-toggler-right" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false"
                aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto my-2 my-lg-0">
                    <li class="nav-item"><a class="nav-link" href="#portfolio">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Profile</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Dashboard Content -->
    <div class="container-fluid mt-5 pt-5">
        <img id="toggleSidebar" src="imgs/side-bar.png" alt="Toggle Sidebar" class="sidebar-toggle-icon mb-3"
            style="width: 50px; height: auto;" />
    </div>

    <!-- Dashboard with two rows on the left and three rows on the right -->

                            </div>

                                </tbody>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
